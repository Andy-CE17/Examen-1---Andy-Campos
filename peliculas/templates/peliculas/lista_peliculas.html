<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Películas</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        .contenedor {
            max-width: 1000px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: black;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: black;
            color: #f1c40f;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .volver {
            text-align: center;
            margin-top: 20px;
        }

        .volver a {
            text-decoration: none;
            background: black;
            color: #f1c40f;
            padding: 10px 20px;
            border-radius: 8px;
        }

        .volver a:hover {
            background: #f1c40f;
            color: black;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Lista de Películas</h1>

    {% if peliculas %}
    <table>
        <tr>
            <th>Título</th>
            <th>Año</th>
            <th>Género</th>
            <th>Director</th>
        </tr>
        {% for p in peliculas %}
        <tr>
            <td>{{ p.titulo }}</td>
            <td>{{ p.anio_estreno }}</td>
            <td>{{ p.genero }}</td>
            <td>{{ p.director.nombre }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
        <p style="text-align:center;">No hay películas</p>
    {% endif %}

    <div class="volver">
        <a href="/">Volver</a>
    </div>
</div>

</body>
</html>
